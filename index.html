<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026開運カレンダー</title>
    <style>
        body { font-family: sans-serif; background: #fdf5e6; color: #333; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #d4af37; font-size: 1.5em; margin-bottom: 5px; }
        .date-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .lucky { color: #e67e22; font-weight: bold; }
        .action { font-size: 0.9em; color: #666; text-align: left; flex: 1; margin-left: 10px; }
        .footer { font-size: 0.8em; color: #999; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ 2026 七赤金星 開運App</h1>
        <p>今月のテーマ：<b>「言葉を形に、変化を楽しむ」</b></p>
    </div>

    <div class="card">
        <h3>📅 直近のラッキーDAY</h3>
        <div class="date-row">
            <span class="lucky">3/13(金)</span>
            <span class="action">一粒万倍日：アプリの核となる機能を1つ実装。</span>
        </div>
        <div class="date-row">
            <span class="lucky">3/21(土)</span>
            <span class="action">春分の日：恵方参りで開発の成功を祈願。</span>
        </div>
        <div class="date-row">
            <span class="lucky">3/31(火)</span>
            <span class="action">天赦日：最強開運日。重要な意思決定に。</span>
        </div>
        <div class="date-row">
            <span class="lucky">4/13(月)</span>
            <span class="action">巳の日：UIデザインのブラッシュアップ。</span>
        </div>
    </div>

    <div class="card">
        <h3>💡 開発Tips</h3>
        <p style="font-size: 0.9em;">「七赤」の運気アップには、午後のティータイムに甘いものを食べながら作業するのが◎</p>
    </div>

    <p class="footer">© 2026 My Fortune App Beta</p>
</body>
</html>
